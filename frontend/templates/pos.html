{% extends "base.html" %}

{% block title %}POS Billing — Salethur Supermarket{% endblock %}
{% block page_title %}<i data-lucide="shopping-cart" style="vertical-align: middle; margin-right: 8px;"></i>Billing Counter{% endblock %}

{% block topbar_extra %}
<div class="topbar-barcode-input" title="Barcode scanner — scan or type here">
  <i data-lucide="barcode" style="width: 18px; height: 18px; color: var(--text-muted);"></i>
  <input id="barcode-field" type="text" placeholder="Scan barcode…"
         autocomplete="off"
         onkeydown="if(event.key==='Enter'){processBarcode(this.value);this.value=''}">
</div>
{% endblock %}

{% block content %}
<div class="pos-layout">

  <!-- ══ LEFT PANEL ══════════════════════════════════════════ -->
  <div class="pos-left">

    <!-- Filter tabs + search -->
    <div class="card" style="padding:12px 16px;">
      <div style="display:flex; flex-direction:column; gap:12px; align-items:flex-start;">
        <div class="filter-tabs" id="filter-tabs">
          <div class="filter-tab active" onclick="setFilterTab(this,'all')"
               hx-get="/pos/products?status=all"
               hx-target="#product-list" hx-swap="innerHTML"
               hx-indicator="#prod-spinner">All</div>
          <div class="filter-tab" onclick="setFilterTab(this,'in_stock')"
               hx-get="/pos/products?status=in_stock"
               hx-target="#product-list" hx-swap="innerHTML"
               hx-indicator="#prod-spinner">In Stock</div>
          <div class="filter-tab" onclick="setFilterTab(this,'low_stock')"
               hx-get="/pos/products?status=low_stock"
               hx-target="#product-list" hx-swap="innerHTML"
               hx-indicator="#prod-spinner">Low Stock</div>
          <div class="filter-tab" onclick="setFilterTab(this,'out_of_stock')"
               hx-get="/pos/products?status=out_of_stock"
               hx-target="#product-list" hx-swap="innerHTML"
               hx-indicator="#prod-spinner">Out of Stock</div>
        </div>

        <div style="display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.05); padding:6px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); width: 100%; max-width: 400px;">
          <i data-lucide="search" style="width:16px; height:16px; color:var(--text-muted);"></i>
          <input type="search" class="form-control" style="flex:1; border:none; background:transparent;"
                 placeholder="Search products by name or category…"
                 name="q"
                 hx-get="/pos/search"
                 hx-trigger="keyup changed delay:300ms"
                 hx-target="#product-list"
                 hx-swap="innerHTML"
                 hx-indicator="#prod-spinner">
          <span class="htmx-indicator spinner" id="prod-spinner"></span>
        </div>
      </div>
    </div>

    <!-- Product grid -->
    <div class="card" style="flex:1; overflow:hidden; display:flex; flex-direction:column; padding:12px;">
      <div class="product-grid" id="product-list"
           hx-get="/pos/products?status=all"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div style="color:var(--text-muted); padding:20px; text-align:center;">
          <span class="spinner"></span> Loading products…
        </div>
      </div>
    </div>

    <!-- Recent Bills -->
    <div class="card" style="max-height:200px; overflow:hidden;">
      <div class="card-header">
        <div class="card-title"><i data-lucide="clock" style="width:18px; height:18px; vertical-align:middle; margin-right:6px;"></i>Recent Bills</div>
        <span class="htmx-indicator spinner" id="bills-spinner"></span>
      </div>
      <div id="recent-bills"
           hx-get="/pos/recent-bills"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML"
           hx-indicator="#bills-spinner"
           style="overflow-y:auto; max-height:130px;">
        <div style="color:var(--text-muted); font-size:0.8rem;">Loading…</div>
      </div>
    </div>

  </div>

  <!-- ══ RIGHT PANEL (CART) ═══════════════════════════════════ -->
  <div class="pos-right">
    <div id="cart-section"
         hx-get="/pos/cart"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div style="color:var(--text-muted); text-align:center; padding:40px;">
        <span class="spinner"></span>
      </div>
    </div>
  </div>

</div>

<!-- Payment modal mount point -->
<div id="modal-container"></div>
{% endblock %}
