{% extends "base.html" %}
{% block title %}Inventory — Salethur Supermarket{% endblock %}
{% block page_title %}<i data-lucide="package" style="vertical-align:middle; margin-right:8px;"></i>Inventory{% endblock %}

{% block content %}
<div>
  <!-- ── Tabs ──────────────────────────────────────────────── -->
  <div class="inv-tabs">
    <div class="inv-tab active" id="tab-list" onclick="switchInvTab(this)"
         hx-get="/inventory/products"
         hx-target="#inv-content"
         hx-swap="innerHTML">
      <i data-lucide="list" style="width:16px; height:16px; vertical-align:middle; margin-right:6px;"></i>Product List
    </div>
    <div class="inv-tab" id="tab-add" onclick="switchInvTab(this)"
         hx-get="/inventory/add-form"
         hx-target="#inv-content"
         hx-swap="innerHTML">
      <i data-lucide="plus-circle" style="width:16px; height:16px; vertical-align:middle; margin-right:6px;"></i>Add Product
    </div>
    <div class="inv-tab" id="tab-restock" onclick="switchInvTab(this)"
         hx-get="/inventory/restock-form"
         hx-target="#inv-content"
         hx-swap="innerHTML">
      <i data-lucide="refresh-cw" style="width:16px; height:16px; vertical-align:middle; margin-right:6px;"></i>Restock
    </div>
    <div class="inv-tab" id="tab-alerts" onclick="switchInvTab(this)"
         hx-get="/inventory/stock-alerts"
         hx-target="#inv-content"
         hx-swap="innerHTML">
      <i data-lucide="alert-triangle" style="width:16px; height:16px; vertical-align:middle; margin-right:6px;"></i>Stock Alerts
    </div>
    <div class="inv-tab" id="tab-categories" onclick="switchInvTab(this)"
         hx-get="/inventory/categories"
         hx-target="#inv-content"
         hx-swap="innerHTML">
      <i data-lucide="folder-tree" style="width:16px; height:16px; vertical-align:middle; margin-right:6px;"></i>Categories
    </div>
  </div>

  <!-- ── Content area ─────────────────────────────────────── -->
  <div id="inv-content"
       hx-get="/inventory/products"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div style="text-align:center; padding:40px; color:var(--text-muted);">
      <span class="spinner"></span> Loading inventory…
    </div>
  </div>
</div>

<script>
function switchInvTab(el) {
    const tabs = document.getElementsByClassName('inv-tab');
    for (let i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
    }
    el.classList.add('active');
}

// Listen for the productAdded event from the server
document.body.addEventListener('productAdded', () => {
    console.log('Product added/restocked, switching to list tab...');
    const listTab = document.getElementById('tab-list');
    if (listTab) {
        switchInvTab(listTab);
    } else {
        console.warn('Could not find tab-list element');
    }
});
</script>
{% endblock %}
