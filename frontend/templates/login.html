<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salethur Supermarket — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
    });
  </script>
  <meta name="description" content="Salethur Supermarket POS and CRM System — Login">
  <script>window.API_BASE = "{{ api_base }}";</script>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon"><i data-lucide="shopping-cart" style="width: 48px; height: 48px; color: var(--accent);"></i></div>
      <div class="logo-name">Salethur Supermarket</div>
      <div class="logo-sub">Point of Sale &amp; CRM System</div>
    </div>

    <div class="login-error" id="login-error"></div>

    <form onsubmit="handleLogin(event)" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text"
               class="form-control" placeholder="Enter username"
               required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password"
               class="form-control" placeholder="Enter password"
               required autocomplete="current-password">
      </div>
      <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary btn-full btn-xl"><i data-lucide="lock" style="width: 16px; height: 16px; margin-right: 6px; vertical-align: middle;"></i>Sign In</button>
      </div>
    </form>

    <div style="text-align:center; margin-top:20px; font-size:0.72rem; color:rgba(255,255,255,0.25);">
      E26 Supermarket &mdash; POS v2.0
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
