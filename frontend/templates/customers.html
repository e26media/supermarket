{% extends "base.html" %}
{% block title %}Customers — Salethur Supermarket{% endblock %}
{% block page_title %}<i data-lucide="users" style="vertical-align:middle; margin-right:8px;"></i>Customers{% endblock %}

{% block content %}
<div class="customer-layout">

  <!-- ── Customer Table ──────────────────────────────────────── -->
  <div class="card" style="display:flex; flex-direction:column; overflow:hidden;">
    <div class="card-header">
      <div class="card-title">Customer Directory</div>
      <div style="position:relative; display:flex; align-items:center;">
        <i data-lucide="search" style="position:absolute; left:10px; width:14px; height:14px; color:var(--text-muted);"></i>
        <input type="search" class="form-control" style="width:220px; padding-left:32px;"
               placeholder="Search name / phone…"
               hx-get="/customers/search"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#customer-table-body"
               hx-swap="innerHTML"
               name="q">
      </div>
    </div>
    <div style="overflow-y:auto; flex:1;">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Orders</th>
            <th>Total Spent</th>
            <th>Last Purchase</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="customer-table-body"
               hx-get="/customers/list"
               hx-trigger="load"
               hx-swap="innerHTML">
          <tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:20px;">
            <span class="spinner"></span> Loading…
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Customer Insights Panel ────────────────────────────── -->
  <div class="customer-insights">
    <div class="card">
      <div class="card-title" style="margin-bottom:12px;">Customer Insights</div>
      <div id="customer-insights-content" style="color:var(--text-muted); font-size:0.83rem; text-align:center; padding:20px 0; display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="font-size:2rem; color:var(--border);"><i data-lucide="mouse-pointer-2" style="width:32px; height:32px;"></i></div>
        Click a customer to view insights
      </div>
    </div>
  </div>

</div>
{% endblock %}
