services:
  # Backend API
  - type: web
    name: supermarket-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supermarket-db
          property: connectionString
        
  # Frontend UI
  - type: web
    name: supermarket-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn frontend.routes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: supermarket-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # PostgreSQL Database
  - name: supermarket-db
    databaseName: supermarket
    user: admin
