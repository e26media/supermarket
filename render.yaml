databases:
  - name: supermarket-db
    plan: free
    databaseName: supermarket
    user: supermarket_user

services:
  - type: web
    name: supermarket-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supermarket-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: supermarket-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn frontend.routes:app --host 0.0.0.0 --port 10000
    envVars:
      - key: API_BASE
        value: http://supermarket-backend:10000